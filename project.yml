name: Barra
options:
  bundleIdPrefix: com.nzayn
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.nzayn.barra
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Barra:
    type: application
    platform: iOS
    sources:
      - path: Barra
    resources:
      - path: Barra/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Barra/Info.plist
        PRODUCT_NAME: Barra
